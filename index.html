<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Civil Citizens Canada</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-stone-950 text-stone-100">
    <main class="relative flex min-h-screen items-center justify-center overflow-hidden px-6 py-24">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(251,191,36,0.18),_transparent_32%),radial-gradient(circle_at_bottom,_rgba(14,165,233,0.16),_transparent_28%),linear-gradient(135deg,_#0c0a09_0%,_#1c1917_50%,_#0c0a09_100%)]"></div>
        <section class="relative w-full max-w-3xl rounded-3xl border border-white/10 bg-white/5 p-10 text-center shadow-2xl shadow-black/40 backdrop-blur">
            <img
                src="assets/img/Civil-Citizens-For-Canada-Party.png"
                alt="Civil Citizens For Canada Party logo"
                class="mx-auto mb-8 w-full max-w-sm rounded-2xl bg-white p-4 shadow-lg shadow-black/30"
            >
            <p class="mb-4 text-sm uppercase tracking-[0.45em] text-amber-300">Civil Citizens Canada</p>
            <h1 class="text-5xl font-black uppercase tracking-tight text-white sm:text-7xl">Building a Fairer Canada</h1>
            <p class="mx-auto mt-6 max-w-2xl text-lg leading-8 text-stone-300">
                Civil Citizens For Canada Party is laying out a platform focused on work, growth, transparency, and a tax system ordinary citizens can understand.
            </p>
            <div class="mt-10 flex flex-col items-center justify-center gap-4 sm:flex-row">
                <a
                    href="economic-policy.html"
                    class="inline-flex items-center justify-center rounded-full bg-red-600 px-8 py-3 text-sm font-bold uppercase tracking-[0.2em] text-white transition hover:bg-red-500"
                >
                    Economic Policy
                </a>
                <a
                    href="economic-policy.html#foundation"
                    class="inline-flex items-center justify-center rounded-full border border-white/20 px-8 py-3 text-sm font-bold uppercase tracking-[0.2em] text-stone-200 transition hover:border-white/40 hover:text-white"
                >
                    Tax Reform Foundation
                </a>
            </div>
        </section>
    </main>
</body>
</html>
